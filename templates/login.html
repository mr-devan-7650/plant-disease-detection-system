<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Plant Disease Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 40%, #10b981 100%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        body::before {
            width: 400px; height: 400px;
            background: rgba(5, 150, 105, 0.5);
            top: -100px; left: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: rgba(16, 185, 129, 0.6);
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 30px) scale(1.1); }
        }

        /* Left panel - branding */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: white;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: leafBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
        }
        @keyframes leafBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        .brand-subtitle {
            font-size: 1rem;
            text-align: center;
            opacity: 0.85;
            max-width: 320px;
            line-height: 1.7;
        }

        .brand-stats {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }

        .brand-stat {
            text-align: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .brand-stat h3 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .brand-stat p {
            font-size: 0.75rem;
            opacity: 0.85;
        }

        /* Right panel - form */
        .right-panel {
            width: 480px;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
            position: relative;
            z-index: 1;
            box-shadow: -20px 0 60px rgba(0,0,0,0.15);
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.4rem;
        }

        .form-header p {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        /* Tab switcher */
        .tab-switcher {
            display: flex;
            background: var(--gray-100);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray-500);
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Form */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-500);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .input-wrapper i.toggle-password {
            left: unset;
            right: 14px;
            pointer-events: all;
            cursor: pointer;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.85rem 0.85rem 0.85rem 2.8rem;
            border: 2px solid var(--gray-300);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-900);
            transition: all 0.3s ease;
            outline: none;
            background: var(--gray-50);
            cursor: text;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-500);
            font-size: 0.9rem;
            transition: color 0.2s;
            pointer-events: all;
        }
        .toggle-password:hover { color: var(--primary); }

        .btn-auth {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-auth:active { transform: translateY(0); }

        .btn-auth .spinner-btn {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider {
            text-align: center;
            position: relative;
            margin: 1.5rem 0;
            color: var(--gray-500);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--gray-300);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-google {
            width: 100%;
            padding: 0.85rem;
            background: white;
            color: var(--gray-700);
            border: 2px solid var(--gray-300);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-google:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .error-msg {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-msg {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .forgot-link {
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
        .forgot-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.83rem;
            font-weight: 500;
        }
        .forgot-link a:hover { text-decoration: underline; }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link a:hover { color: var(--primary); }

        /* Password strength */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: var(--gray-200);
            margin-top: 6px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 2px;
            width: 0;
            transition: all 0.3s ease;
        }
        .strength-text {
            font-size: 0.75rem;
            margin-top: 4px;
            color: var(--gray-500);
        }

        @media (max-width: 900px) {
            .left-panel { padding: 2rem 1.5rem; }
            .brand-title { font-size: 1.7rem; }
            .brand-stats { gap: 1rem; }
            .right-panel { width: 420px; padding: 2rem; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; align-items: center; justify-content: flex-start; }
            .left-panel {
                display: flex;
                width: 100%;
                padding: 2rem 1.5rem 1.5rem;
                min-height: unset;
            }
            .brand-logo { font-size: 3rem; margin-bottom: 0.8rem; }
            .brand-title { font-size: 1.4rem; margin-bottom: 0.5rem; }
            .brand-subtitle { font-size: 0.85rem; max-width: 280px; }
            .brand-stats { gap: 0.8rem; margin-top: 1.2rem; }
            .brand-stat { padding: 0.6rem 1rem; }
            .brand-stat h3 { font-size: 1.1rem; }
            .brand-stat p { font-size: 0.7rem; }
            .right-panel {
                width: 100%;
                min-height: unset;
                box-shadow: none;
                padding: 1.8rem 1.2rem 2rem;
                border-radius: 24px 24px 0 0;
                margin-top: -16px;
                z-index: 2;
            }
        }

        @media (max-width: 400px) {
            .right-panel { padding: 1.5rem 1rem 2rem; }
            .form-header h2 { font-size: 1.4rem; }
            .brand-stats { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- Left branding panel -->
<div class="left-panel">
    <div class="brand-logo">🌿</div>
    <h1 class="brand-title">Plant Disease<br>Detection System</h1>
    <p class="brand-subtitle">AI-powered plant health monitoring using Deep Learning. Detect diseases instantly and get expert treatment recommendations.</p>
    <div class="brand-stats">
        <div class="brand-stat">
            <h3>38+</h3>
            <p>Diseases</p>
        </div>
        <div class="brand-stat">
            <h3>94%</h3>
            <p>Accuracy</p>
        </div>
        <div class="brand-stat">
            <h3>14</h3>
            <p>Plants</p>
        </div>
    </div>
</div>

<!-- Right form panel -->
<div class="right-panel">
    <div class="form-header">
        <h2>Welcome 👋</h2>
        <p>Sign in to your account or create a new one</p>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        <button class="tab-btn" onclick="switchTab('signup')">
            <i class="fas fa-user-plus"></i> Sign Up
        </button>
    </div>

    <!-- Error / Success messages -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- LOGIN FORM -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <i class="fas fa-eye toggle-password" onclick="togglePwd('loginPassword', this)"></i>
            </div>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
            <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
            <div class="spinner-btn" id="loginSpinner"></div>
        </button>

    </form>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="signupName" placeholder="Your full name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" required oninput="checkStrength(this.value)">
                <i class="fas fa-eye toggle-password" onclick="togglePwd('signupPassword', this)"></i>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupConfirm" placeholder="Re-enter your password" required>
                <i class="fas fa-eye toggle-password" onclick="togglePwd('signupConfirm', this)"></i>
            </div>
        </div>

        <button type="submit" class="btn-auth" id="signupBtn">
            <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
            <div class="spinner-btn" id="signupSpinner"></div>
        </button>

    </form>

    <div class="back-link">
        <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail,
             updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // =============================================
    // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
    // =============================================
    const firebaseConfig = {
        apiKey: "AIzaSyBPFEYMziCCCyr4FBod_Nhz82os_9XXaA8",
        authDomain: "plant-disease-history.firebaseapp.com",
        databaseURL: "https://plant-disease-history-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "plant-disease-history",
        storageBucket: "plant-disease-history.firebasestorage.app",
        messagingSenderId: "450353943942",
        appId: "1:450353943942:web:ca6e6a35fa7d2b1a214807"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // ADMIN EMAIL - only this email gets admin access
    const ADMIN_EMAIL = "ugale.ganesh.d@gmail.com"; // 🔥 Change to your email

    // ---- Save user to DB ----
    async function saveUserToDB(uid, name, email, role) {
        await set(ref(db, `users/${uid}`), {
            name, email, role,
            createdAt: new Date().toISOString()
        });
    }

    // ---- After login redirect ----
    async function redirectAfterLogin(user) {
        const snap = await get(ref(db, `users/${user.uid}`));
        const userData = snap.val();
        const role = userData?.role || 'user';

        if (role === 'admin') {
            window.location.href = '/admin';
        } else {
            window.location.href = '/';
        }
    }

    // ---- LOGIN ----
    window.handleLogin = async function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        showLoading('login');
        clearMessages();

        try {
            const cred = await signInWithEmailAndPassword(auth, email, password);
            showSuccess('Login successful! Redirecting...');
            await redirectAfterLogin(cred.user);
        } catch (err) {
            showError(getFriendlyError(err.code));
        } finally {
            hideLoading('login');
        }
    };

    // ---- SIGNUP ----
    window.handleSignup = async function(e) {
        e.preventDefault();
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;

        if (password !== confirm) {
            showError('Passwords do not match!');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        showLoading('signup');
        clearMessages();

        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(cred.user, { displayName: name });

            const role = email === ADMIN_EMAIL ? 'admin' : 'user';
            await saveUserToDB(cred.user.uid, name, email, role);

            showSuccess('Account created! Redirecting...');
            setTimeout(() => redirectAfterLogin(cred.user), 1200);
        } catch (err) {
            showError(getFriendlyError(err.code));
        } finally {
            hideLoading('signup');
        }
    };

    // ---- GOOGLE ----
    window.handleGoogleLogin = async function() {
        clearMessages();
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;

            // Check if user exists in DB
            const snap = await get(ref(db, `users/${user.uid}`));
            if (!snap.exists()) {
                const role = user.email === ADMIN_EMAIL ? 'admin' : 'user';
                await saveUserToDB(user.uid, user.displayName, user.email, role);
            }

            showSuccess('Login successful! Redirecting...');
            await redirectAfterLogin(user);
        } catch (err) {
            showError(getFriendlyError(err.code));
        }
    };

    // ---- FORGOT PASSWORD ----
    window.handleForgotPassword = async function() {
        const email = document.getElementById('loginEmail').value;
        if (!email) {
            showError('Please enter your email address first.');
            return;
        }
        try {
            await sendPasswordResetEmail(auth, email);
            showSuccess('Password reset email sent! Check your inbox.');
        } catch (err) {
            showError(getFriendlyError(err.code));
        }
    };

    // ---- Friendly errors ----
    function getFriendlyError(code) {
        const errors = {
            'auth/wrong-password': 'Incorrect password. Please try again.',
            'auth/user-not-found': 'No account found with this email.',
            'auth/email-already-in-use': 'This email is already registered. Please login.',
            'auth/weak-password': 'Password is too weak. Use at least 6 characters.',
            'auth/invalid-email': 'Invalid email address format.',
            'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
            'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
            'auth/network-request-failed': 'Network error. Check your internet connection.'
        };
        return errors[code] || 'Something went wrong. Please try again.';
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearMessages() {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }
    function showLoading(type) {
        document.getElementById(`${type}Btn`).querySelector('.btn-text').style.display = 'none';
        document.getElementById(`${type}Spinner`).style.display = 'block';
    }
    function hideLoading(type) {
        document.getElementById(`${type}Btn`).querySelector('.btn-text').style.display = 'block';
        document.getElementById(`${type}Spinner`).style.display = 'none';
    }
</script>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
        });
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    function togglePwd(id, icon) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        icon.className = `fas fa-${isText ? 'eye' : 'eye-slash'} toggle-password`;
    }

    function checkStrength(pwd) {
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (pwd.length >= 6) score++;
        if (pwd.length >= 10) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;

        const levels = [
            { color: '#ef4444', label: 'Very Weak', width: '20%' },
            { color: '#f97316', label: 'Weak', width: '40%' },
            { color: '#eab308', label: 'Fair', width: '60%' },
            { color: '#22c55e', label: 'Strong', width: '80%' },
            { color: '#10b981', label: 'Very Strong', width: '100%' }
        ];
        const level = levels[Math.min(score - 1, 4)] || levels[0];
        fill.style.width = level.width;
        fill.style.background = level.color;
        text.textContent = level.label;
        text.style.color = level.color;
    }
</script>
</body>
</html>
